<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <style>
    body {
      width: 300px; margin: 0; padding: 16px;
      font-family: "Pretendard", "Noto Sans KR", sans-serif;
      font-size: 13px; color: #0f2a1e; background: #fff;
    }
    h1 { font-size: 14px; font-weight: 800; margin: 0 0 2px; }
    .sub { font-size: 11px; color: #9ca3af; margin-bottom: 14px; }
    .row { margin-bottom: 10px; }
    label { display: block; font-size: 11px; color: #6b7280; margin-bottom: 4px; }
    input {
      width: 100%; box-sizing: border-box; padding: 8px 10px;
      border: 1px solid #e0ede9; border-radius: 8px; font-size: 13px; outline: none;
    }
    button {
      width: 100%; padding: 10px; border: none; border-radius: 8px;
      font-size: 13px; font-weight: 700; cursor: pointer;
    }
    #saveBtn { background: #0f2a1e; color: #fff; }
    #collectBtn { background: #ef567c; color: #fff; margin-top: 6px; }
    #collectBtn:disabled { background: #c4c8cc; cursor: default; }
    .status {
      background: #f7f8fa; border: 1px solid #e8eaed; border-radius: 8px;
      padding: 10px 12px; margin-bottom: 12px; line-height: 1.6;
    }
    .ok { color: #15803d; font-weight: 700; }
    .warn { color: #b45309; font-weight: 700; }
    .weekly { display: flex; gap: 3px; margin-top: 6px; }
    .day {
      flex: 1; height: 18px; border-radius: 4px; background: #e8eaed;
      display: flex; align-items: center; justify-content: center;
      font-size: 9px; color: #9ca3af;
    }
    .day.hit { background: #dcfce7; color: #15803d; font-weight: 700; }
    #msg { font-size: 11px; margin-top: 8px; min-height: 14px; }
  </style>
</head>
<body>
  <h1>SellFit Price Guard</h1>
  <div class="sub">쿠팡 판매가 자동 수집 — 읽기·기록만</div>

  <div class="status" id="statusBox">불러오는 중...</div>

  <div class="row" id="setupRow" style="display:none">
    <label>SellFit 스토어 코드 (6자리)</label>
    <input id="pinInput" maxlength="6" placeholder="예) 483920" />
    <div style="height:8px"></div>
    <label>확장 토큰 (관리자에게 전달받은 값)</label>
    <input id="tokenInput" placeholder="sfext_..." />
    <div style="height:8px"></div>
    <button id="saveBtn">저장</button>
  </div>

  <button id="collectBtn">지금 수집 →</button>
  <div id="msg"></div>

  <script src="popup.js"></script>
</body>
</html>
